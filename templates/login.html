{% extends 'base.html' %}
{% load static %}

{% block title %}Login - GROOVY{% endblock %}

{% block content %}
<h2>Login</h2>
<div id="login-message" class="message"></div>

<div class="form-group">
    <label>Username</label>
    <input type="text" id="login-username" placeholder="Enter username">
</div>

<div class="form-group">
    <label>Password</label>
    <input type="password" id="login-password" placeholder="Enter password">
</div>

<button class="btn-pink" onclick="login()" style="width: 100%;">Login</button>

<p class="switch-link">
    Don't have an account? <a href="{% url 'register' %}">Register</a>
</p>
{% endblock %}

{% block extra_js %}
<script>
async function login() {
    const username = document.getElementById('login-username').value;
    const password = document.getElementById('login-password').value;

    if (!username || !password) {
        showMessage('login-message', 'Hey! Fill in the blanks!', 'error');
        return;
    }

    try {
        const response = await fetch(API_URL + 'auth/login/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();
        if (response.ok) {
            localStorage.setItem('access', data.tokens.access);
            localStorage.setItem('refresh', data.tokens.refresh);
            window.location.href = '{% url "dashboard" %}';
        } else {
            showMessage('login-message', data.error || 'Nope! Wrong password or something...', 'error');
        }
    } catch (err) {
        showMessage('login-message', 'Whoops! The internet hiccupped. Try again!', 'error');
    }
}

// Allow enter key to submit
document.getElementById('login-password').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') login();
});
document.getElementById('login-username').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') login();
});
</script>
{% endblock %}
