{% extends 'base.html' %}
{% load static %}

{% block title %}Login - GROOVY{% endblock %}

{% block content %}
<h2>Login</h2>
<div id="login-message" class="message"></div>

<div class="form-group">
    <label>Username</label>
    <input type="text" id="login-username" placeholder="Enter username">
</div>

<div class="form-group">
    <label>Password</label>
    <input type="password" id="login-password" placeholder="Enter password">
</div>

<button class="btn-pink" onclick="login()" style="width: 100%;">Login</button>

<!-- Google Sign-In Button -->
<div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #ddd;">
    <p style="text-align: center; color: #666; margin-bottom: 10px;">Or login with</p>
    <button id="google-signin-btn" class="btn-turquoise" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;">
        <img src="https://www.gstatic.com/firebaseapp/v8.10.1/images/firebaseui-icon-provider-google.svg" alt="Google" style="width: 20px; height: 20px;">
        Google
    </button>
</div>

<p class="switch-link">
    Don't have an account? <a href="{% url 'register' %}">Register</a>
</p>
{% endblock %}

{% block extra_js %}
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
async function login() {
    const username = document.getElementById('login-username').value;
    const password = document.getElementById('login-password').value;

    if (!username || !password) {
        showMessage('login-message', 'Hey! Fill in the blanks!', 'error');
        return;
    }

    try {
        const response = await fetch(API_URL + 'auth/login/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();
        if (response.ok) {
            localStorage.setItem('access', data.tokens.access);
            localStorage.setItem('refresh', data.tokens.refresh);
            window.location.href = '{% url "dashboard" %}';
        } else {
            showMessage('login-message', data.error || 'Nope! Wrong password or something...', 'error');
        }
    } catch (err) {
        showMessage('login-message', 'Whoops! The internet hiccupped. Try again!', 'error');
    }
}

// Google Sign-In Setup
async function initGoogleSignIn() {
    try {
        const configResponse = await fetch(API_URL + 'auth/google/config/');
        const configData = await configResponse.json();
        
        if (!window.google) {
            setTimeout(initGoogleSignIn, 500);
            return;
        }
        
        google.accounts.id.initialize({
            client_id: configData.client_id,
            callback: handleGoogleSignIn
        });
    } catch (err) {
        console.error('Failed to initialize Google Sign-In:', err);
    }
}

async function handleGoogleSignIn(response) {
    if (response.credential) {
        try {
            const result = await fetch(API_URL + 'auth/google/callback/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    credential: response.credential,
                    redirect_uri: window.location.origin + '{% url "login" %}'
                })
            });

            const data = await result.json();
            if (result.ok && data.access) {
                localStorage.setItem('access', data.access);
                if (data.refresh) localStorage.setItem('refresh', data.refresh);
                window.location.href = '{% url "dashboard" %}';
            } else {
                showMessage('login-message', data.error || 'Google login failed', 'error');
            }
        } catch (err) {
            showMessage('login-message', 'Error during Google login', 'error');
        }
    }
}

// Google Button Click Handler
document.getElementById('google-signin-btn').addEventListener('click', function(e) {
    e.preventDefault();
    if (window.google && window.google.accounts && window.google.accounts.id) {
        google.accounts.id.renderButton(
            document.getElementById('google-signin-btn'),
            { theme: 'outline', size: 'large', text: 'signin_with' }
        );
        google.accounts.id.prompt();
    }
});

// Initialize on page load
window.addEventListener('load', initGoogleSignIn);

// Allow enter key to submit
document.getElementById('login-password').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') login();
});
document.getElementById('login-username').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') login();
});
</script>
{% endblock %}
