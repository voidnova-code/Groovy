{% extends 'base.html' %}
{% load static %}

{% block title %}Login - GROOVY{% endblock %}

{% block content %}
<h2>Login</h2>
<div id="login-message" class="message"></div>

<div class="form-group">
    <label>Username</label>
    <input type="text" id="login-username" placeholder="Enter username">
</div>

<div class="form-group">
    <label>Password</label>
    <input type="password" id="login-password" placeholder="Enter password">
</div>

<button class="btn-pink" onclick="login()" style="width: 100%;">Login</button>

<!-- Google Sign-In Button -->
<div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #ddd;">
    <p style="text-align: center; color: #666; margin-bottom: 10px;">Or login with</p>
    <button id="google-signin-btn" class="btn-turquoise" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;">
        <img src="https://www.gstatic.com/firebaseapp/v8.10.1/images/firebaseui-icon-provider-google.svg" alt="Google" style="width: 20px; height: 20px;">
        Google
    </button>
</div>

<p class="switch-link">
    Don't have an account? <a href="{% url 'register' %}">Register</a>
</p>
{% endblock %}

{% block extra_js %}
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
async function login() {
    const username = document.getElementById('login-username').value;
    const password = document.getElementById('login-password').value;

    if (!username || !password) {
        showMessage('login-message', 'Hey! Fill in the blanks!', 'error');
        return;
    }

    try {
        const response = await fetch(API_URL + 'auth/login/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();
        if (response.ok) {
            localStorage.setItem('access', data.tokens.access);
            localStorage.setItem('refresh', data.tokens.refresh);
            window.location.href = '{% url "dashboard" %}';
        } else {
            showMessage('login-message', data.error || 'Nope! Wrong password or something...', 'error');
        }
    } catch (err) {
        showMessage('login-message', 'Whoops! The internet hiccupped. Try again!', 'error');
    }
}

// Google Sign-In
async function loginWithGoogle() {
    try {
        // Get Google client config
        const configResponse = await fetch(API_URL + 'auth/google/config/');
        const configData = await configResponse.json();
        
        // Build OAuth URL
        const redirectUri = window.location.origin + '/auth/google/callback/';
        const scope = 'openid profile email';
        const googleAuthUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
            `client_id=${configData.client_id}&` +
            `redirect_uri=${encodeURIComponent(redirectUri)}&` +
            `response_type=code&` +
            `scope=${encodeURIComponent(scope)}`;
        
        // Redirect to Google OAuth
        window.location.href = googleAuthUrl;
    } catch (err) {
        showMessage('login-message', 'Failed to start Google login', 'error');
    }
}

// Wire up Google button click
document.addEventListener('DOMContentLoaded', function() {
    const googleBtn = document.getElementById('google-signin-btn');
    if (googleBtn) {
        googleBtn.addEventListener('click', function(e) {
            e.preventDefault();
            loginWithGoogle();
        });
    }
    
    // Allow enter key to submit
    const passwordInput = document.getElementById('login-password');
    const usernameInput = document.getElementById('login-username');
    if (passwordInput) {
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    }
    if (usernameInput) {
        usernameInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    }
});
</script>
{% endblock %}
