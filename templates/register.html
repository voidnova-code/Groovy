{% extends 'base.html' %}
{% load static %}

{% block title %}Register - GROOVY{% endblock %}

{% block content %}
<h2>Register</h2>
<div id="register-message" class="message"></div>

<div class="form-group">
    <label>Username</label>
    <input type="text" id="register-username" placeholder="Pick a cool username">
</div>

<div class="form-group">
    <label>Email</label>
    <input type="email" id="register-email" placeholder="Enter email">
</div>

<div class="form-group">
    <label>Password</label>
    <input type="password" id="register-password" placeholder="Your secret code">
</div>

<button class="btn-turquoise" onclick="register()" style="width: 100%;">Register</button>

<!-- Google Sign-Up Button -->
<div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #ddd;">
    <p style="text-align: center; color: #666; margin-bottom: 10px;">Or sign up with</p>
    <button id="google-signup-btn" class="btn-pink" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;">
        <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="flex-shrink: 0;">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
    </button>
</div>

<p class="switch-link">
    Already have an account? <a href="{% url 'login' %}">Login</a>
</p>
{% endblock %}

{% block extra_js %}
<script>
async function register() {
    const username = document.getElementById('register-username').value;
    const email = document.getElementById('register-email').value;
    const password = document.getElementById('register-password').value;

    if (!username || !password) {
        showMessage('register-message', 'Hey! Fill in the blanks!', 'error');
        return;
    }

    try {
        const response = await fetch(API_URL + 'auth/register/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });

        const data = await response.json();
        if (response.ok) {
            localStorage.setItem('access', data.tokens.access);
            localStorage.setItem('refresh', data.tokens.refresh);
            window.location.href = '{% url "dashboard" %}';
        } else {
            showMessage('register-message', Object.values(data).flat().join(', '), 'error');
        }
    } catch (err) {
        showMessage('register-message', 'Whoops! The internet hiccupped. Try again!', 'error');
    }
}

// Google Sign-Up
async function signupWithGoogle() {
    try {
        // Get Google client config
        const configResponse = await fetch(API_URL + 'auth/google/config/');
        const configData = await configResponse.json();
        
        // Build OAuth URL
        const redirectUri = window.location.origin + '/auth/google/callback/';
        const scope = 'openid profile email';
        const googleAuthUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
            `client_id=${configData.client_id}&` +
            `redirect_uri=${encodeURIComponent(redirectUri)}&` +
            `response_type=code&` +
            `scope=${encodeURIComponent(scope)}`;
        
        // Redirect to Google OAuth
        window.location.href = googleAuthUrl;
    } catch (err) {
        showMessage('register-message', 'Failed to start Google sign-up', 'error');
    }
}

// Wire up Google button click
document.addEventListener('DOMContentLoaded', function() {
    const googleBtn = document.getElementById('google-signup-btn');
    if (googleBtn) {
        googleBtn.addEventListener('click', function(e) {
            e.preventDefault();
            signupWithGoogle();
        });
    }
    
    // Allow enter key to submit
    const passwordInput = document.getElementById('register-password');
    const usernameInput = document.getElementById('register-username');
    if (passwordInput) {
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') register();
        });
    }
    if (usernameInput) {
        usernameInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') register();
        });
    }
});
</script>
{% endblock %}
