{% extends 'base.html' %}
{% load static %}

{% block title %}Game - GROOVY{% endblock %}

{% block content %}
<div class="score-section" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px;">
    <div class="score-box" style="padding: 12px; border: 3px solid var(--dark-brown); text-align: center; color: white; font-family: 'Fredoka One', cursive; background: linear-gradient(135deg, var(--pink), #FF8A8A); transform: rotate(-2deg);">
        <div class="score-value" id="score-x" style="font-size: 1.8em;">0</div>
        <div class="score-label" style="font-size: 0.8em; text-transform: uppercase;">X Wins</div>
    </div>
    <div class="score-box" style="padding: 12px; border: 3px solid var(--dark-brown); text-align: center; color: white; font-family: 'Fredoka One', cursive; background: linear-gradient(135deg, var(--turquoise), #7EDDD6); transform: rotate(3deg); margin-top: 10px;">
        <div class="score-value" id="score-o" style="font-size: 1.8em;">0</div>
        <div class="score-label" style="font-size: 0.8em; text-transform: uppercase;">O Wins</div>
    </div>
    <div class="score-box" style="grid-column: span 2; padding: 12px; border: 3px solid var(--dark-brown); text-align: center; font-family: 'Fredoka One', cursive; background: linear-gradient(135deg, var(--yellow), #FFE68A); color: var(--dark-brown); transform: rotate(1deg);">
        <div class="score-value" id="score-draw" style="font-size: 1.8em;">0</div>
        <div class="score-label" style="font-size: 0.8em; text-transform: uppercase;">Draws</div>
    </div>
</div>

<div class="player-info" style="display: flex; justify-content: space-between; margin-bottom: 20px; padding: 15px; background: var(--cream); border: 3px solid var(--dark-brown);">
    <div>
        <div class="player-symbol x" style="font-size: 2.2em; font-family: 'Fredoka One', cursive; color: var(--pink);">X</div>
        <div class="player-name" id="player-x-name" style="text-align: center; font-size: 0.85em; color: var(--dark-brown); margin-top: 4px;"></div>
    </div>
    <div style="font-size: 1.2em; color: var(--dark-brown); align-self: center;">VS</div>
    <div>
        <div class="player-symbol o" style="font-size: 2.2em; font-family: 'Fredoka One', cursive; color: var(--turquoise);">O</div>
        <div class="player-name" id="player-o-name" style="text-align: center; font-size: 0.85em; color: var(--dark-brown); margin-top: 4px;"></div>
    </div>
</div>

<div id="room-code-display" style="text-align: center; padding: 12px 20px; background: var(--yellow); border: 3px solid var(--dark-brown); font-family: 'Fredoka One', cursive; font-size: 1.8em; letter-spacing: 6px; color: var(--dark-brown); margin-bottom: 20px;"></div>

<div id="turn-indicator" class="turn-indicator" style="text-align: center; padding: 15px; font-size: 1.4em; font-family: 'Fredoka One', cursive; margin-bottom: 20px; border: 3px solid var(--dark-brown); animation: pulse 1.5s ease-in-out infinite; background: var(--yellow); color: var(--dark-brown);"></div>

<div class="game-board" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px; background: var(--yellow); border: 3px solid var(--dark-brown); transform: rotate(0.5deg); margin-bottom: 20px;">
    <div class="cell" data-index="0" onclick="makeMove(0)"></div>
    <div class="cell" data-index="1" onclick="makeMove(1)"></div>
    <div class="cell" data-index="2" onclick="makeMove(2)"></div>
    <div class="cell" data-index="3" onclick="makeMove(3)"></div>
    <div class="cell" data-index="4" onclick="makeMove(4)"></div>
    <div class="cell" data-index="5" onclick="makeMove(5)"></div>
    <div class="cell" data-index="6" onclick="makeMove(6)"></div>
    <div class="cell" data-index="7" onclick="makeMove(7)"></div>
    <div class="cell" data-index="8" onclick="makeMove(8)"></div>
</div>

<div class="nav-links">
    <a href="{% url 'donate' %}">Donate</a> |
    <a href="{% url 'about' %}">About</a>
</div>

<button class="btn-white" onclick="window.location.href='{% url 'dashboard' %}'" style="width: 100%;">Back to Dashboard</button>
{% endblock %}

{% block extra_css %}
<style>
.cell {
    aspect-ratio: 1;
    background: white;
    border: 3px solid var(--dark-brown);
    border-radius: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2.8em;
    font-family: 'Fredoka One', cursive;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.cell:hover:not(.taken) {
    transform: scale(1.08) rotate(3deg);
    box-shadow: 0 0 15px var(--pink);
}
.cell.taken { cursor: not-allowed; }
.cell.x { color: var(--pink); }
.cell.o { color: var(--turquoise); }
.cell.winning {
    background: var(--yellow);
    animation: winPulse 0.6s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
}
@keyframes winPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05) rotate(5deg); }
}
.x-turn { background: var(--pink) !important; color: white !important; }
.o-turn { background: var(--turquoise) !important; color: white !important; }
</style>
{% endblock %}

{% block extra_js %}
<script>
let scores = JSON.parse(localStorage.getItem('ttt_scores')) || { x: 0, o: 0, draw: 0 };
let currentRoomCode = new URLSearchParams(window.location.search).get('code');
let pollInterval = null;
let lastGameStatus = null;
let gameFinished = false;

document.getElementById('score-x').textContent = scores.x;
document.getElementById('score-o').textContent = scores.o;
document.getElementById('score-draw').textContent = scores.draw;
document.getElementById('room-code-display').textContent = currentRoomCode;

async function init() {
    await checkAuth();
    await loadGameState();
    startPolling();
}

async function loadGameState() {
    if (!currentRoomCode) return;
    try {
        const response = await fetch(API_URL + 'rooms/get_room/?code=' + currentRoomCode, {
            headers: { 'Authorization': 'Bearer ' + accessToken }
        });
        if (response.status === 401) {
            window.location.href = '/?section=login';
            return;
        }
        if (response.ok) {
            const data = await response.json();
            updateGameUI(data);
        }
    } catch (err) {
        console.error('Failed to load game state');
    }
}

function updateGameUI(data) {
    document.getElementById('player-x-name').textContent = data.player_x_username;
    document.getElementById('player-o-name').textContent = data.player_o_username || 'Waiting...';

    const cells = document.querySelectorAll('.cell');
    cells.forEach((cell, index) => {
        cell.textContent = data.board_state[index];
        cell.classList.remove('x', 'o', 'taken', 'winning');
        if (data.board_state[index]) {
            cell.classList.add('taken');
            cell.classList.add(data.board_state[index].toLowerCase());
        }
    });

    const isPlayerX = currentUser.id === data.player_x;
    const isPlayerO = currentUser.id === data.player_o;
    const isMyTurn = (isPlayerX && data.current_turn === 'X') || (isPlayerO && data.current_turn === 'O');

    const turnDiv = document.getElementById('turn-indicator');
    turnDiv.className = 'turn-indicator';
    turnDiv.style.animation = 'pulse 1.5s ease-in-out infinite';

    if (data.status === 'finished') {
        turnDiv.style.animation = 'none';
        stopPolling();
        if (!gameFinished) {
            gameFinished = true;
            if (data.is_draw) {
                turnDiv.textContent = "Well, that was TENSE!";
                turnDiv.style.background = 'var(--yellow)';
                turnDiv.style.color = 'var(--dark-brown)';
                scores.draw++;
                document.getElementById('score-draw').textContent = scores.draw;
            } else {
                const isWinner = data.winner === currentUser.id;
                const winnerSymbol = data.winner === data.player_x ? 'X' : 'O';
                turnDiv.textContent = isWinner ? 'You absolute legend!' : 'Better luck next time, champ!';
                turnDiv.classList.add(winnerSymbol === 'X' ? 'x-turn' : 'o-turn');
                if (isWinner) {
                    if (isPlayerX) { scores.x++; document.getElementById('score-x').textContent = scores.x; }
                    else { scores.o++; document.getElementById('score-o').textContent = scores.o; }
                }
                const winningCombo = checkWinner(data.board_state);
                if (winningCombo) winningCombo.forEach(i => cells[i].classList.add('winning'));
            }
            localStorage.setItem('ttt_scores', JSON.stringify(scores));

            setTimeout(() => {
                autoResetGame();
            }, 3000);
        }
    } else if (data.status === 'playing') {
        gameFinished = false;
        turnDiv.textContent = isMyTurn ? "Your Turn!" : "Opponent's Turn";
        turnDiv.classList.add(data.current_turn === 'X' ? 'x-turn' : 'o-turn');
    } else {
        gameFinished = false;
        turnDiv.textContent = 'Waiting for opponent...';
        turnDiv.style.background = 'var(--yellow)';
        turnDiv.style.color = 'var(--dark-brown)';
    }
}

function checkWinner(board) {
    const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for (let combo of wins) {
        if (board[combo[0]] && board[combo[0]] === board[combo[1]] && board[combo[0]] === board[combo[2]]) return combo;
    }
    return null;
}

async function makeMove(position) {
    if (!currentRoomCode) return;
    try {
        const response = await fetch(API_URL + 'rooms/move/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + accessToken
            },
            body: JSON.stringify({ room_code: currentRoomCode, position: position })
        });
        if (response.ok) {
            const data = await response.json();
            updateGameUI(data);
        } else {
            const data = await response.json();
            alert(data.error || 'Hey! You can\'t do that there!');
        }
    } catch (err) {
        alert('The move got lost in the void! Try again.');
    }
}

function startPolling() {
    stopPolling();
    pollInterval = setInterval(loadGameState, 2000);
}

function stopPolling() {
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

async function autoResetGame() {
    try {
        const response = await fetch(API_URL + 'rooms/auto_reset_game/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + accessToken
            },
            body: JSON.stringify({ room_code: currentRoomCode })
        });
        if (response.ok) {
            gameFinished = false;
            await loadGameState();
            startPolling();
        } else {
            console.error('Auto-reset failed');
        }
    } catch (err) {
        console.error('Error auto-resetting game:', err);
    }
}

init();
</script>
{% endblock %}
